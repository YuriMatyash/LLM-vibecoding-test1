<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Sanctuary Todo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Overview">
        <h1 class="brand">Digital Sanctuary</h1>

        <section class="panel focus-panel" aria-label="Today's focus summary">
          <p class="eyebrow">Today's Focus</p>
          <p class="focus-copy"><span id="focus-count">0</span> tasks remaining</p>
          <div class="focus-meter" aria-hidden="true">
            <div id="focus-meter-bar" class="focus-meter-bar"></div>
          </div>
        </section>

        <section class="panel helper-panel" aria-label="Tip">
          <p class="eyebrow">Daily Reflection</p>
          <p>Small consistent steps keep your day calm and clear.</p>
        </section>
      </aside>

      <section class="main" aria-label="Todo list">
        <header class="hero">
          <h2>Today</h2>
          <p>Focus on what matters most in your sanctuary.</p>
        </header>

        <section class="panel composer-panel" aria-label="Create a task">
          <form id="todo-form" class="todo-form" autocomplete="off">
            <label for="todo-title-input" class="sr-only">Task title</label>
            <input id="todo-title-input" type="text" placeholder="Add a new task to your day..." maxlength="160" required />
            <button type="submit">Add Task</button>
          </form>
        </section>

        <section class="toolbar" aria-label="Todo controls">
          <div class="filters" role="group" aria-label="Filter tasks">
            <button type="button" data-filter="all" class="filter is-active">All</button>
            <button type="button" data-filter="active" class="filter">Active</button>
            <button type="button" data-filter="completed" class="filter">Completed</button>
          </div>
          <button type="button" id="clear-completed" class="clear-button">Clear completed</button>
        </section>

        <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
        <p id="todo-count" class="todo-count">0 active tasks</p>
      </section>
    </main>

    <template id="todo-item-template">
      <li class="todo-item">
        <label class="todo-main">
          <input type="checkbox" class="toggle" aria-label="Mark task complete" />
          <span class="title"></span>
        </label>

        <input type="text" class="edit-title-input" aria-label="Edit task title" maxlength="160" />

        <div class="actions">
          <button type="button" class="edit">Edit</button>
          <button type="button" class="save">Save</button>
          <button type="button" class="cancel">Cancel</button>
          <button type="button" class="delete" aria-label="Delete task">Delete</button>
        </div>
      </li>
    </template>

    <script src="todoStore.js"></script>
    <script src="app.js"></script>
  </body>
</html>
